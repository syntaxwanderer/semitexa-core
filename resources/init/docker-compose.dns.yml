# Semitexa Local DNS & Nginx Proxy
# DNS: lightweight dnsmasq for local domains.
# Reverse Proxy: Nginx catching port 80 and proxying to the Swoole container.
services:
  dns:
    image: alpine:3.21
    restart: unless-stopped
    command: [ "sh", "-c", "apk add --no-cache dnsmasq && dnsmasq --keep-in-foreground --conf-file=/etc/dnsmasq.d/dnsmasq.conf" ]
    ports:
      - "127.0.0.1:5553:53/udp"
      - "127.0.0.1:5553:53/tcp"
    volumes:
      - ./var/dns/dnsmasq.conf:/etc/dnsmasq.d/dnsmasq.conf:ro
      - ./var/dns/domains.conf:/etc/dnsmasq.d/domains.conf:ro
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: [ "CMD", "nslookup", "localhost", "127.0.0.1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    command: |
      sh -c '
      cat << "EOF" > /etc/nginx/conf.d/default.conf
      server {
        listen 80 default_server;
        server_name _;
        location / {
          proxy_pass http://app:${SWOOLE_PORT:-9502};
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }
      }
      EOF
      nginx -g "daemon off;"
      '
    depends_on:
      - app
